services:


  web:

    build:
      context: ./images
      dockerfile: Dockerfile_php
    ports:
      - "8080:80"
    volumes:
      - ./php:/var/www/html
    depends_on:
      - db

  


  db:

    image: mysql:8.0

    volumes:

      - ./db_data:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: password

      MYSQL_DATABASE: Incidencies

      MYSQL_USER: admin

      MYSQL_PASSWORD: ProjecteFinal_12345.

      LANG: C.UTF-8
  
  adminer: 
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db




