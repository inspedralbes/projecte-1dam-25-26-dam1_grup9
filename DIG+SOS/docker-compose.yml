services:


  web:

    build:
      context: ./images
      dockerfile: dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./php:/var/www/html
    depends_on:
      - db

  # Database


  db:

    image: mysql:8.0

    volumes:

      - ./db_data:/var/lib/mysql

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: password

      MYSQL_DATABASE: Incidencies

      MYSQL_USER: admin

      MYSQL_PASSWORD: ProjecteFinal_12345.

      LANG: C.UTF-8



